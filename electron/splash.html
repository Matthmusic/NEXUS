<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #060913;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
    }
    .logo {
      width: 140px;
      height: 140px;
      object-fit: contain;
      filter: drop-shadow(0 0 24px rgba(245,166,35,0.35));
    }
    .name {
      margin-top: 22px;
      color: #f5a623;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 8px;
      text-transform: uppercase;
    }
    .sub {
      margin-top: 6px;
      color: #4a5568;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .dots {
      margin-top: 44px;
      display: flex;
      gap: 7px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f5a623;
      opacity: 0.2;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.25s; }
    .dot:nth-child(3) { animation-delay: 0.5s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.75); }
      40% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <img class="logo" src="./nexus-logo.svg" alt="NEXUS">
  <div class="name">NEXUS</div>
  <div class="sub">Base de prix &eacute;lectriques</div>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</body>
</html>
